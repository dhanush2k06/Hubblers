<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Sign Up - Hubblers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Hub<span>blers</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#events">Events</a></li>
            <li><a href="login.html" class="btn-login">Login</a></li>
        </ul>
    </nav>

    <div class="auth-container">
        <form class="auth-form" id="signupForm">
            <h2>Student Sign Up</h2>
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label for="email">College Email</label>
                <input type="email" id="email" required placeholder="student@university.edu">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Create a strong password">
            </div>
            <button type="submit" class="auth-btn">Join Hubblers</button>
            <div class="auth-footer">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
