<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Hubblers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Hub<span>blers</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#events">Events</a></li>
            <li><a href="signup.html" class="btn-login">Sign Up</a></li>
        </ul>
    </nav>

    <div class="auth-container">
        <form class="auth-form" id="loginForm">
            <h2>Student Login</h2>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="Enter your college email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="auth-btn">Login</button>
            <div class="auth-footer">
                New here? <a href="signup.html">Create a student account</a>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
